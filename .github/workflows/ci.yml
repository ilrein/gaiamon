name: CI

# Deploys are handled by Cloudflare Workers Builds (the repo is connected to
# the Worker in the Cloudflare dashboard, which builds + deploys on push).
# This workflow is the quality gate: types, tests, build.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest
    name: Typecheck, test, build
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile

      # worker-configuration.d.ts is generated (gitignored) — CI must create it.
      - run: bun run cf-typegen

      - run: bun run check

      - run: bun test src

      - run: bun run build
